<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100%;
      min-width: 280px;
      max-width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #ffffff;
      color: #000000;
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .url-box {
      font-size: 12px;
      color: #6b7280;
      padding: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 12px;
      word-break: break-all;
      max-height: 60px;
      overflow: hidden;
    }

    button {
      width: 100%;
      padding: 14px;
      border: 1px solid #000000;
      border-radius: 8px;
      background: #000000;
      color: #ffffff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 10px;
      touch-action: manipulation;
    }

    button:active {
      background: #374151;
      transform: scale(0.98);
    }

    button:disabled {
      background: #e5e7eb;
      border-color: #e5e7eb;
      color: #9ca3af;
      cursor: not-allowed;
    }

    button.secondary {
      background: #ffffff;
      color: #000000;
      border: 1px solid #e5e7eb;
    }

    button.secondary:active {
      background: #f9fafb;
    }

    .section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      padding: 4px 0;
    }

    .toggle {
      appearance: none;
      width: 44px;
      height: 24px;
      background: #e5e7eb;
      border-radius: 24px;
      position: relative;
      cursor: pointer;
      transition: background 0.15s;
      min-width: 44px;
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.15s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    .toggle:checked {
      background: #000000;
    }

    .toggle:checked::after {
      transform: translateX(20px);
    }

    .site-list {
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .site-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      font-size: 13px;
      border-bottom: 1px solid #f3f4f6;
      min-height: 44px;
    }

    .site-item:last-child {
      border-bottom: none;
    }

    .site-item:active {
      background: #f9fafb;
    }

    .remove-btn {
      width: auto;
      margin: 0;
      padding: 6px 12px;
      font-size: 12px;
      background: transparent;
      color: #6b7280;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      min-width: 60px;
    }

    .remove-btn:active {
      background: #fee2e2;
      color: #dc2626;
      border-color: #fecaca;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      -webkit-appearance: none;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #000000;
    }

    .empty {
      text-align: center;
      padding: 24px;
      color: #9ca3af;
      font-size: 13px;
    }

    .hint {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>view</h1>
  <p class="subtitle">Read any article</p>

  <div class="url-box" id="current-url">Loading...</div>

  <button id="open-current">Read without paywall</button>
  <button class="secondary" id="add-site">Add this site</button>

  <div class="section">
    <div class="section-title">Settings</div>
    <div class="row">
      <span>Show button</span>
      <input type="checkbox" class="toggle" id="btn-toggle" checked>
    </div>
    <div class="row">
      <span>Auto-detect</span>
      <input type="checkbox" class="toggle" id="auto-toggle" checked>
    </div>
    <div class="row">
      <span>Open in new tab</span>
      <input type="checkbox" class="toggle" id="tab-toggle" checked>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Sites</div>
    <div class="input-row">
      <input type="text" id="site-input" placeholder="example.com">
      <button class="secondary" id="add-input" style="width: auto; margin: 0; padding: 12px 16px;">Add</button>
    </div>
    <div class="site-list" id="site-list">
      <div class="empty">No sites added</div>
    </div>
    <p class="hint">174 sites pre-loaded</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
